<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fafafa;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;text-align:center}
h1{font-family:'Fraunces',serif;font-size:4rem;font-weight:900;margin-bottom:2rem}
p{opacity:0.5;font-size:1.1rem;margin-bottom:3rem}
.issues{display:flex;flex-direction:column;gap:0.75rem;align-items:center}
.issues a{color:#ff6b35;font-size:1.3rem;font-weight:600;text-decoration:none;border-bottom:2px solid #ff6b3540;padding-bottom:2px;font-family:'Fraunces',serif}
.issues a:hover{opacity:0.8}
</style>
</head>
<body>
<h1>Morning Edition</h1>
<p>Daily curated Hacker News magazine</p>
<div class="issues" id="issues"></div>
<script>
fetch('https://api.github.com/repos/ramp8/morning-edition/contents/')
  .then(r=>r.json())
  .then(files=>{
    const el=document.getElementById('issues');
    files.filter(f=>f.name.match(/^\d{4}-\d{2}-\d{2}\.html$/))
         .sort().reverse()
         .forEach(f=>{
           const a=document.createElement('a');
           a.href=f.name;
           a.textContent=f.name.replace('.html','');
           el.appendChild(a);
         });
  });
</script>
</body>
</html>
